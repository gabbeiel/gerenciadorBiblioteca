<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=search" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca</title>
    <link rel="stylesheet" th:href="@{css/style.css}">
</head>
<body>
    <header>
        <section class="headerContent">
            <div class="logo">
                <img th:href="@{img/logo.png}" class="etecLogo">
            </div>
            <div class="search">
                
            </div>
            <div class="icons">
                <div class="login btnLogin">
                </div>
                <div class="notifi">
                </div>
            </div>
        </section>
    </header>
    <main>
        <div id="telaEditora" class="telaLogin">
            <form th:action="@{/criareditora}" method="post" th:object="${editora}" class="formLogin">
                <div class="ttlLogin"><h1>Criar editora</h1></div>

                <label for="txtNome" class="labelNomeCadastro"> <b> Nome </b> </label>
                <input type="text" th:field="*{nome}" id="txtNome">

                <input type="submit" value="Criar editora" id="btnEntrar">
            </form>

            <div class="formSection">
                <form th:action="@{/criareditora/editar}" method="post" class="formLogin">
                    <div class="ttlLogin"><h1>Editar editora</h1></div>

                    <label for="editoraSelect" class="labelNomeCadastro"> <b> Editora existente </b> </label>
                    <select name="id" id="editoraSelect">
                        <option th:each="e : ${editoras}" th:value="${e.id.id}" th:text="${e.nome.nome}">Editora</option>
                    </select>

                    <input type="submit" value="Editar editora" id="btnEntrar">
                </form>
            </div>
        </div>
    </main>
    
</body>
<footer>
    <div>
        <p>Copyright © 2024 - Todos os direitos reservados.</p>
    </div>
</footer>
</html>
