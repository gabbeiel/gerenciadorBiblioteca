<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=search" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca</title>
    <link rel="stylesheet" th:href="@{css/style.css}">
</head>
<body>
    <header>
        <section class="headerContent">
            <div class="logo">
                <a th:href="@{/}"><img th:src="@{/img/logo.png}" class="etecLogo"></a>
            </div>
            <div class="search">
                
            </div>
            <div class="icons">
                <div class="login btnLogin">
                </div>
                <div class="notifi">
                </div>
            </div>
        </section>
    </header>
    <main>
        <div id="telaCadastro" class="telaLogin">
            <form th:action="@{/crialivro}" method=post th:object="${livro}" class="formLogin">
                <div class="ttlLogin"><h1>Criar livro</h1></div>
                <label for="txtNome" class="labelNomeCadastro"> <b> Nome </b> </label>
                <input type="text" th:field="*{nome}" id="txtNome">

                <label for="txtISBN" class="labelEmailCadastro"> <b> ISBN</b> </label>
                <input type="text"  th:field="*{isbn}" id="txtISBN">

                <label for="txtSinopse" class="labelSenhaCadastro"> <b> Sinopse </b> </label>
                <input type="text" th:field="*{sinopse}" id="txtSinopse">

                <label for="autorSelect" class="labelSenhaCadastro"> <b> Autor </b> </label>
                <select th:field="*{idAutor}" id="autorSelect">
                    <option th:each="a : ${autores}" th:value="${a.id.id}" th:text="${a.nome.nome}">Autor</option>
                </select>
                <span class="txtCadastro"> <a th:href="@{/criarautor}">Criar novo autor</a> </span>

                <label for="editoraSelect" class="labelSenhaCadastro"> <b> Editora </b> </label>
                <select th:field="*{idEditora}" id="editoraSelect">
                    <option th:each="e : ${editoras}" th:value="${e.id.id}" th:text="${e.nome.nome}">Editora</option>
                </select>
                <span class="txtCadastro"> <a th:href="@{/criareditora}">Criar nova editora</a> </span>

                <input type="submit" value="Criar livro" id="btnEntrar">
                
            </form>
        </div>
    </main>
    
</body>
<footer>
    <div>
        <p>Copyright © 2024 - Todos os direitos reservados.</p>
    </div>
</footer>
</html>
