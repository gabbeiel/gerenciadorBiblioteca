<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=search" /> 
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca - Livro</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/livro.css}">
</head>
<body>
    <header>
        <section class="headerContent">
            <div class="logo">
                <img th:src="@{/img/logo.png}" class="etecLogo" alt="Logo">
            </div>
            <div class="search">
            </div>
            <div class="icons">
                <div class="login btnLogin">
                    <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path d="M234-276q51-39 114-61.5T480-360q69 0 132 22.5T726-276q35-41 54.5-93T800-480q0-133-93.5-226.5T480-800q-133 0-226.5 93.5T160-480q0 59 19.5 111t54.5 93Zm146.5-204.5Q340-521 340-580t40.5-99.5Q421-720 480-720t99.5 40.5Q620-639 620-580t-40.5 99.5Q539-440 480-440t-99.5-40.5ZM480-80q-83 0-156-31.5T197-197q-54-54-85.5-127T80-480q0-83 31.5-156T197-763q54-54 127-85.5T480-880q83 0 156 31.5T763-763q54 54 85.5 127T880-480q0 83-31.5 156T763-197q-54 54-127 85.5T480-80Zm100-95.5q47-15.5 86-44.5-39-29-86-44.5T480-280q-53 0-100 15.5T294-220q39 29 86 44.5T480-160q53 0 100-15.5ZM523-537q17-17 17-43t-17-43q-17-17-43-17t-43 17q-17 17-17 43t17 43q17 17 43 17t43-17Zm-43-43Zm0 360Z"/></svg>
                </div>
                <div class="notifi">
                    <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path d="M522.5-237.5Q540-255 540-280H420q0 25 17.5 42.5T480-220q25 0 42.5-17.5ZM280-320h400v-80h-40v-104q0-61-31.5-111.5T520-680v-20q0-17-11.5-28.5T480-740q-17 0-28.5 11.5T440-700v20q-57 14-88.5 64.5T320-504v104h-40v80Zm120-80v-120q0-33 23.5-56.5T480-600q33 0 56.5 23.5T560-520v120H400Zm80 320q-83 0-156-31.5T197-197q-54-54-85.5-127T80-480q0-83 31.5-156T197-763q54-54 127-85.5T480-880q83 0 156 31.5T763-763q54 54 85.5 127T880-480q0 83-31.5 156T763-197q-54 54-127 85.5T480-80Zm0-80q134 0 227-93t93-227q0-134-93-227t-227-93q-134 0-227 93t-93 227q0 134 93 227t227 93Zm0-320Z"/></svg>
                </div>
            </div>
        </section>
    </header>

    <main>
        <section>
            <div class="livroInfo">
                <div class="livroImg">
                    <img th:src="@{/img/livros/1.jpg}" alt="Capa do livro">
                </div>
                <div class="livroDetalhes">
                    <h1 th:text="${livro.nome.nome}">Título</h1>
                    <p class="sinopse" th:text="${livro.sinopse.sinopse}">Lorem ipsum dolor sit amet, consectetur adipiscing elit.</p>
                    <p><b>Autor(a):</b> <span th:text="${livro.autor.nome.nome}">Nome do Autor</span></p>
                    <p><b>Editora:</b> <span th:text="${livro.editora.nome.nome}">Nome da Editora</span></p>
                    <p><b>ISBN:</b> <span th:text="${livro.isbn.isbn}">000-0000000000</span></p>
                    <div class="btnEditar"> 
                        <a th:href="@{'/livro/editar/' + ${livro.id.id}}" ><svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path d="M200-200h57l391-391-57-57-391 391v57Zm-80 80v-170l528-527q12-11 26.5-17t30.5-6q16 0 31 6t26 18l55 56q12 11 17.5 26t5.5 30q0 16-5.5 30.5T817-647L290-120H120Zm640-584-56-56 56 56Zm-141 85-28-29 57 57-29-28Z"/></svg></a> 
                    </div>
                    
                </div>
            </div>
        </section>

        <div class="escurecido escondido"></div>
        <div class="telaLogin escondido">
            <div class="formLogin">
                <div class="ttlLogin"><h1>Entrar</h1></div>
                <label for="txtLogin" class="labelUser"><b>Usuário</b></label>
                <input id="txtLogin" type="text" placeholder="Digite seu usuário...">
                <label for="txtSenha" class="labelSenha"><b>Senha</b></label>
                <input id="txtSenha" type="password" placeholder="Digite sua senha...">
                <input id="btnEntrar" type="button" value="Entrar">
                <input id="btnCancelar" type="button" value="Cancelar">
                <p class="areaErro escondido">Login e senha devem ser preenchidos</p>
            </div>
        </div>
    </main>

    <input type="hidden" id="info" name="info">
    <input type="hidden" id="infoFav" name="infoFav">
    <script type="text/javascript" th:src="@{/js/login.js}"></script>
    <script type="text/javascript" th:src="@{/js/favoritar.js}"></script>
</body>
</html>
