<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=search" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca - Editar Autor</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <header>
        <section class="headerContent">
            <div class="logo">
                <img th:src="@{/img/logo.png}" class="etecLogo" alt="Logo">
            </div>
            <div class="search"></div>
            <div class="icons">
                <div class="login btnLogin"></div>
                <div class="notifi"></div>
            </div>
        </section>
    </header>
    <main>
        <div id="telaAutor" class="telaLogin">
            <form th:action="@{'/criarautor/' + ${id}}" method="post" class="formLogin">
                <div class="ttlLogin"><h1>Editar autor</h1></div>

                <label for="txtNome" class="labelNomeCadastro"> <b> Nome </b> </label>
                <input type="text" name="nome" th:value="${autor.nome.nome}" id="txtNome">

                <input type="submit" value="Salvar autor" id="btnEntrar">
            </form>

            <div class="formSection">
                <form th:action="@{'/criarautor/' + ${id} + '/deletar'}" method="post" class="formLogin">
                    <input type="submit" value="Excluir autor" id="btnEntrar">
                </form>
            </div>
        </div>
    </main>
</body>
<footer>
    <div>
        <p>Copyright © 2024 - Todos os direitos reservados.</p>
    </div>
</footer>
</html>
