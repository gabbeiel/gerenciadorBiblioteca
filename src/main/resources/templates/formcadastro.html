<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=search" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca</title>
    <link rel="stylesheet" th:href="@{css/style.css}">
</head>
<body>
    <header>
        <section class="headerContent">
            <div class="logo">
                <img th:href="@{img/logo.png}" class="etecLogo">
            </div>
            <div class="search">
                
            </div>
            <div class="icons">
                <div class="login btnLogin">
                </div>
                <div class="notifi">
                </div>
            </div>
        </section>
    </header>
    <main>
        <div id="telaCadastro" class="telaLogin">
            <form th:action="@{/cadastro}" method=post th:object="${usuario}" class="formLogin">
                <div class="ttlLogin"><h1>Criar conta</h1></div>
                
                <label for="txtNome" class="labelNome"> <b> Nome </b> </label>
                <input type="text" th:field="*{nome}" id="txtNome">

                <label for="txtEmail" class="labelEmail"> <b> Email</b> </label>
                <input type="text"  th:field="*{email}" id="txtEmail">

                <label for="txtSenha" class="labelSenha"> <b> Senha </b> </label>
                <input type="password" th:field="*{senha}" id="txtSenha">
                <input type="submit" value="Criar conta" id="btnEntrar">
                
            </form>
        </div>
    </main>
    
</body>
<footer>
    <div>
        <p>Copyright © 2024 - Todos os direitos reservados.</p>
    </div>
</footer>
</html>
